<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators</title>
</head>
<body>
    <h1>Operators in JavaScript</h1>
    <script>
        console.log(1 + "2" + 3);
        console.log(1 + 2 + "3");
        console.log("5" - 2);
        console.log("5" + 2);
        console.log(0 == false);
        console.log(0 === false);

    let a = 5;
        console.log(a++);
        console.log(a);

    let b = 5;
        console.log(++b);

    let x= 5;
    let y = x++ + ++x;
        console.log(y);

        console.log(true + true);
        console.log(true + false);
        console.log([] == false);
        console.log("" == 0);
        console.log(5 &&  10);
        console.log(0 || 100);
        console.log(!"hello");
        console.log(!0);
        console.log("10" * "2");
        console.log("10" / 2);
        console.log("hello" * 2)
        console.log(typeof NaN);
        console.log([] + []);
        console.log([] + {});
        console.log({} + []);
    let c = "5";
    let d = 2;
        console.log(c - d + c);
        console.log([] == ![]);
        console.log(typeof null);
        console.log([] == 0);
        console.log([1,2] + [3,4]);
        console.log("2" > "12");
        console.log(2 > "12");
        console.log(Boolean("false"));
        console.log(Boolean(""));
        console.log(100 / "10");
        console.log(true == "1");
        console.log(false == "0");
        console.log(false === "0");
        console.log(1<2<3);
        console.log(3 > 2 > 1);
        console.log(+"10");
        console.log(+"hello");
    let p = 10;
        console.log(p +=5);
    let q = 10;
        console.log( q *= 2);
        console.log(2 ** 3);
        console.log(typeof typeof 1);
        console.log([] instanceof Array);
        console.log({} instanceof Object);
        console.log([] == "");
        console.log([0] == 0);
    </script>
</body>
</html>
