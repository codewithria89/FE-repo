<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopZone</title>
  <link rel="stylesheet" href="creat.css">
</head>
<body>

<header class="header">
  <div class="logo">ShopZone</div>

  <div class="search">
    <input type="text" placeholder="Search products...">
    <button>Search</button>
  </div>

  <div class="user">
    <span>Account</span>
    <span>Orders</span>
    <span>Cart 🛒</span>
  </div>
</header>

<div class="container">

  <!-- Left Sidebar -->
  <aside class="left">
    <h3>Categories</h3>
    <a href="#">Electronics</a>
    <a href="#">Fashion</a>
    <a href="#">Mobiles</a>
    <a href="#">Home</a>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <h1>Today's Deals</h1>

    <div class="products">
      <div class="card">
        <img src="https://via.placeholder.com/150">
        <p>Headphones</p>
        <span>₹999</span>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/150">
        <p>Shoes</p>
        <span>₹1499</span>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/150">
        <p>Watch</p>
        <span>₹1999</span>
      </div>
    </div>
  </main>

  <!-- Right Sidebar -->
  <aside class="right">
    <div class="ads">🔥 Big Sale</div>
    <div class="sidebar">Your Orders</div>
  </aside>

</div>

<footer class="footer">
  © 2026 ShopZone. All rights reserved.
</footer>

</body>
</html>
